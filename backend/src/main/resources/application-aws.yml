spring:
  application:
    name: roadeye-backend
  datasource:
    # url: jdbc:postgresql://${RDS_ENDPOINT}:5432/postgres
    # url: jdbc:postgresql://${RDS_ENDPOINT}:6543/postgres?sslmode=require
    # url: jdbc:postgresql://${RDS_ENDPOINT}:6543/postgres?sslmode=require&prepareThreshold=0
    url: jdbc:postgresql://${RDS_ENDPOINT}:5432/postgres?sslmode=require
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}
    driverClassName: org.postgresql.Driver
    hikari:
      maximumPoolSize: 10
      minimumIdle: 5
      connectionTimeout: 30000
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
          fetch_size: 50
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 5000
  servlet:
    context-path: /api
  compression:
    enabled: true
    min-response-size: 1024

logging:
  level:
    com.roadeye: INFO
    com.zaxxer.hikari: DEBUG
    org.postgresql: DEBUG
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info,mappings
  endpoint:
    health:
      show-details: when-authorized
