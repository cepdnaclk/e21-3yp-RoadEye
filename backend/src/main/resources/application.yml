# RoadEye Spring Boot Backend Configuration

# Server Configuration
server:
  port: 8080
  address: 0.0.0.0
  servlet:
    context-path: /
  compression:
    enabled: true

# Spring Application
spring:
  application:
    name: RoadEye Backend

  # PostgreSQL Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5433/roadeye_db      # ← 5432 is the default PostgreSQL port
    username: roadeye_user
    password: roadeye_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000

  # JPA/Hibernate Configuration
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect   # ← explicitly set dialect
    hibernate:
      ddl-auto: update    # ← 'update' is safer than 'none' during development
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    show-sql: true          # ← true during dev so you can see queries

  # Flyway — disabled for now (enable when DB is stable)
  flyway:
    enabled: false

# Logging Configuration
logging:
  level:
    root: INFO
    com.roadeye: DEBUG
    org.springframework.web: INFO
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Application-specific properties
app:
  name: RoadEye
  version: 1.0.0
  description: Smart Safety System for Motorcycle Riders