# RoadEye Spring Boot Backend Configuration

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true

# Spring Application
spring:
  application:
    name: RoadEye Backend

  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: validate # Validate existing schema
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    show-sql: false

  # PostgreSQL Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5433/roadeye_db
    username: roadeye_user
    password: roadeye_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000

  # Flyway Configuration for database migrations
  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true

# Logging Configuration
logging:
  level:
    root: INFO
    com.roadeye: DEBUG
    org.springframework.web: INFO
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Application-specific properties
app:
  name: RoadEye
  version: 1.0.0
  description: Smart Safety System for Motorcycle Riders
